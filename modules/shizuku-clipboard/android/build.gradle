plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'com.jericx.syncclipboardmobile'
version = '1.0.0'

android {
  namespace "expo.modules.shizukuclipboard"
  defaultConfig {
    versionCode 1
    versionName "1.0.0"
  }
  buildFeatures {
    aidl true
  }
}

tasks.whenTaskAdded { task ->
    if (task.name.startsWith('compile') && task.name.endsWith('Aidl') && task.name.contains('Release')) {
        task.doLast {
            def aidlDir = project.buildDir.toPath()
                .resolve('generated/aidl_source_output_dir/release/out')
            if (aidlDir.toFile().exists()) {
                aidlDir.toFile().eachFileRecurse { file ->
                    if (file.name.endsWith('.java') && file.text.startsWith('/*')) {
                        def cleaned = file.text.replaceFirst(/(?s)^\/\*.*?\*\/\s*/, '')
                        file.text = cleaned
                        println "Stripped AIDL header comment from ${file}"
                    }
                }
            }
        }
    }
}

dependencies {
  implementation 'com.facebook.react:react-native:0.83.2'
  implementation 'androidx.core:core-ktx:1.13.1'
  implementation project(':native-util')

  // Shizuku API
  def shizuku_version = "13.1.5"
  implementation "dev.rikka.shizuku:api:$shizuku_version"
  implementation "dev.rikka.shizuku:provider:$shizuku_version"
}
